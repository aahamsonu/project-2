{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo">
            <i class="fas fa-clipboard-list fa-3x text-primary"></i>
            <h3 class="mt-3">CUTM Complaint Portal</h3>
            <p class="text-muted">Login to your account</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth_login') }}" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="registration_no" class="form-label">Registration Number</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                    <input type="text" class="form-control" id="registration_no" name="registration_no" 
                           placeholder="Enter registration number" required>
                </div>
                <div class="invalid-feedback">Please enter your registration number.</div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Enter password" required>
                </div>
                <div class="invalid-feedback">Please enter your password.</div>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p class="mb-0">Don't have an account? 
                <a href="{{ url_for('auth_register') }}" class="text-primary">Register here</a>
            </p>
        </div>
        
        <hr class="my-4">

            <p class="text-muted small mb-2">Demo Credentials:</p>
            <div class="row g-2">

</div>

<script>
// Form validation
(function() {
    'use strict';
    var forms = document.querySelectorAll('.needs-validation');
    Array.prototype.slice.call(forms).forEach(function(form) {
        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        }, false);
    });
})();
</script>
{% endblock %}
